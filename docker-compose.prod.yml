services:
  kete:
    image: tims/kete:latest
    container_name: kete
    environment:
      DATABASE_URL: sqlite:////data/kete.db

      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: kete
      JWT_EXPIRES_MINUTES: "1440"  # 24h

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}

      ASSETS_DIR: /assets
      STORE_ORIGINAL: ${STORE_ORIGINAL:-false}
      OUTPUT_FORMAT: ${OUTPUT_FORMAT:-webp}
      DISPLAY_MAX_EDGE: ${DISPLAY_MAX_EDGE:-2048}
      DISPLAY_QUALITY: ${DISPLAY_QUALITY:-82}
      THUMB_MAX_EDGE: ${THUMB_MAX_EDGE:-360}
      THUMB_QUALITY: ${THUMB_QUALITY:-70}

      # If you later host UI elsewhere, set this (comma-separated):
      CORS_ORIGINS: ${CORS_ORIGINS:-}

    volumes:
      - /mnt/data/docker/kete/assets:/assets
    ports:
      - "18090:8000"
    restart: unless-stopped
