services:
  stowge:
    image: simontims/stowge:latest
    container_name: stowge
    environment:
      DATABASE_URL: sqlite:////data/stowge.db

      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: stowge
      JWT_EXPIRES_MINUTES: "1440"  # 24h

      ASSETS_DIR: /assets
      STORE_ORIGINAL: ${STORE_ORIGINAL:-false}
      OUTPUT_FORMAT: ${OUTPUT_FORMAT:-webp}
      DISPLAY_MAX_EDGE: ${DISPLAY_MAX_EDGE:-2048}
      DISPLAY_QUALITY: ${DISPLAY_QUALITY:-82}
      THUMB_MAX_EDGE: ${THUMB_MAX_EDGE:-360}
      THUMB_QUALITY: ${THUMB_QUALITY:-70}

      # If you later host UI elsewhere, set this (comma-separated):
      CORS_ORIGINS: ${CORS_ORIGINS:-}

    volumes:
      - /mnt/data/docker/stowge/assets:/assets
      - /mnt/data/docker/stowge/data:/data
    ports:
      - "18090:8000"
    restart: unless-stopped
