services:
  stowge:
    image: simontims/stowge:latest
    container_name: stowge
    environment:
      DATABASE_DIR: /data
      ASSETS_DIR: /assets

      # Iet a strong random secret in production.
      IMAGE_URL_SECRET: "change_me_to_a_long_random_string"
      # SESSION_LIFETIME_MINUTES: "1440"    # default: 24 h
      SESSION_COOKIE_SECURE: "true"         # served over HTTPS in production

      # Leave blank when UI is served by this same container,
      # set when hosting UI from another origin (comma-separated list).
      CORS_ORIGINS: "${CORS_ORIGINS:-}"

    volumes:
      - /mnt/data/docker/stowge/assets:/assets
      - /mnt/data/docker/stowge/data:/data

    # App is exposed at http://<host>:18090
    ports:
      - "18090:8000"

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
