services:
  kete:
    build: .
    image: kete-local:latest
    container_name: kete
    environment:
      DATABASE_URL: sqlite:////data/kete.db

      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: kete
      JWT_EXPIRES_MINUTES: "1440"

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}

      ASSETS_DIR: /assets
      STORE_ORIGINAL: ${STORE_ORIGINAL:-false}
      OUTPUT_FORMAT: ${OUTPUT_FORMAT:-webp}
      DISPLAY_MAX_EDGE: ${DISPLAY_MAX_EDGE:-2048}
      DISPLAY_QUALITY: ${DISPLAY_QUALITY:-82}
      THUMB_MAX_EDGE: ${THUMB_MAX_EDGE:-360}
      THUMB_QUALITY: ${THUMB_QUALITY:-70}

      CORS_ORIGINS: "${CORS_ORIGINS:-}"

    volumes:
      - kete_assets:/assets
      - kete_data:/data
    ports:
      - "18090:8000"
    restart: unless-stopped

volumes:
  kete_assets:
  kete_data: