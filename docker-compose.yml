services:
  stowge:
    # Build locally from this repository.
    build: .
    image: stowge-local:latest
    container_name: stowge

    # Everything needed for a first run is defined here.
    # You can override any value via shell environment variables when running compose.
    environment:
      # App data
      DATABASE_DIR: /data
      ASSETS_DIR: /assets

      # Auth
      # IMPORTANT: Set a strong random secret before any non-throwaway deployment.
      IMAGE_URL_SECRET: ${IMAGE_URL_SECRET:-change_me_to_a_long_random_string}
      # SESSION_LIFETIME_MINUTES: "1440"    # default: 24 h
      # SESSION_COOKIE_SECURE: "false"      # set "true" when behind HTTPS

      # Leave blank when UI is served by this same container.
      # Set when hosting UI from another origin.
      CORS_ORIGINS: "${CORS_ORIGINS:-}"

      # Uncomment to enable full HTTP access logs.
      # LOG_HTTP: "true"

    # Named Docker volumes keep data between container restarts.
    volumes:
      - stowge_assets:/assets
      - stowge_data:/data

    # App is exposed at http://localhost:18090
    ports:
      - "18090:8000"

    # Keep running unless explicitly stopped.
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  # Image files stored by the app
  stowge_assets:
  # SQLite database and app data
  stowge_data: